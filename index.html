<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0f12">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Habits</title>
<style>
  :root{
    --bg:#0d0f12;
    --bg-elev:#15181d;
    --bg-elev2:#1b1f26;
    --border:#262b33;
    --text:#eef0f3;
    --text-dim:#8b919c;
    --text-faint:#5a606b;
    --sport:#3ddc97;
    --lernen:#5b9dff;
    --gesundheit:#ff7a7a;
    --kreativ:#c792ea;
    --arbeit:#ffb84d;
    --sonstiges:#9aa3af;
    --danger:#ff5c5c;
    --radius:16px;
    --radius-sm:10px;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;
    overscroll-behavior-y:none;
    padding-bottom:90px;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
  }

  .app{max-width:480px;margin:0 auto;padding:0 16px;}

  /* HEADER */
  header{
    padding:28px 16px 18px;
    position:sticky;top:0;
    background:linear-gradient(to bottom, var(--bg) 80%, transparent);
    z-index:5;
    max-width:480px;margin:0 auto;
  }
  .header-row{display:flex;justify-content:space-between;align-items:flex-start;}
  .greeting{font-size:13px;color:var(--text-dim);font-weight:500;letter-spacing:0.2px;}
  .date-big{font-size:26px;font-weight:700;letter-spacing:-0.5px;margin-top:2px;}
  .streak-pill{
    display:flex;align-items:center;gap:5px;
    background:var(--bg-elev2);
    border:1px solid var(--border);
    border-radius:100px;
    padding:7px 12px;
    font-size:13px;font-weight:600;
    color:#ffb84d;
    white-space:nowrap;
  }

  .progress-ring-wrap{
    display:flex;align-items:center;gap:14px;
    margin-top:18px;
    background:var(--bg-elev);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:14px 16px;
  }
  .ring-svg{flex-shrink:0;}
  .progress-text{flex:1;}
  .progress-text .big{font-size:19px;font-weight:700;}
  .progress-text .sub{font-size:12.5px;color:var(--text-dim);margin-top:2px;}

  /* TABS */
  .tabs{
    display:flex;gap:6px;
    margin:18px 0 14px;
    overflow-x:auto;
    scrollbar-width:none;
    padding-bottom:2px;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex-shrink:0;
    padding:7px 14px;
    border-radius:100px;
    font-size:13px;font-weight:600;
    background:var(--bg-elev);
    color:var(--text-dim);
    border:1px solid var(--border);
    cursor:pointer;
    transition:all .15s ease;
  }
  .tab.active{
    background:var(--text);
    color:var(--bg);
    border-color:var(--text);
  }

  /* HABIT CARD */
  .habit-list{display:flex;flex-direction:column;gap:10px;}
  .habit-card{
    background:var(--bg-elev);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:14px 14px;
    display:flex;align-items:center;gap:13px;
    transition:transform .12s ease, border-color .12s ease;
    position:relative;
    overflow:hidden;
  }
  .habit-card:active{transform:scale(0.98);}
  .habit-card.done{border-color:var(--cat-color);}
  .cat-bar{
    position:absolute;left:0;top:0;bottom:0;width:3px;
    background:var(--cat-color);
  }
  .check-btn{
    width:46px;height:46px;border-radius:50%;
    border:2px solid var(--cat-color);
    background:transparent;
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:all .15s cubic-bezier(.4,0,.2,1);
    color:var(--cat-color);
  }
  .check-btn.checked{
    background:var(--cat-color);
    color:var(--bg);
    transform:scale(1.05);
  }
  .check-btn svg{width:22px;height:22px;}
  .habit-info{flex:1;min-width:0;}
  .habit-name{font-size:15.5px;font-weight:600;margin-bottom:3px;}
  .habit-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-dim);}
  .cat-chip{
    font-size:11px;font-weight:600;
    padding:2px 8px;border-radius:100px;
    background:color-mix(in srgb, var(--cat-color) 18%, transparent);
    color:var(--cat-color);
  }
  .streak-mini{display:flex;align-items:center;gap:3px;}
  .habit-actions{display:flex;gap:4px;flex-shrink:0;}
  .icon-btn{
    width:30px;height:30px;border-radius:8px;
    border:none;background:transparent;color:var(--text-faint);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .icon-btn:active{background:var(--bg-elev2);}
  .icon-btn svg{width:16px;height:16px;}

  .empty-state{
    text-align:center;padding:60px 20px;color:var(--text-dim);
  }
  .empty-state svg{width:48px;height:48px;margin-bottom:14px;color:var(--text-faint);}
  .empty-state .title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px;}
  .empty-state .sub{font-size:13px;}

  /* FAB */
  .fab{
    position:fixed;bottom:90px;right:20px;
    width:56px;height:56px;border-radius:50%;
    background:var(--text);color:var(--bg);
    border:none;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 20px rgba(0,0,0,0.4);
    cursor:pointer;
    z-index:10;
    transition:transform .15s ease;
  }
  .fab:active{transform:scale(0.92);}
  .fab svg{width:26px;height:26px;}

  /* BOTTOM NAV */
  .bottom-nav{
    position:fixed;bottom:0;left:0;right:0;
    background:rgba(13,15,18,0.92);
    backdrop-filter:blur(20px);
    border-top:1px solid var(--border);
    display:flex;
    justify-content:space-around;
    padding:10px 0 calc(10px + env(safe-area-inset-bottom));
    z-index:20;
  }
  .nav-btn{
    display:flex;flex-direction:column;align-items:center;gap:3px;
    background:none;border:none;color:var(--text-faint);
    font-size:11px;font-weight:600;
    cursor:pointer;
    padding:4px 18px;
  }
  .nav-btn.active{color:var(--text);}
  .nav-btn svg{width:22px;height:22px;}

  /* MODAL / SHEET */
  .sheet-overlay{
    position:fixed;inset:0;
    background:rgba(0,0,0,0.6);
    z-index:50;
    display:none;
    align-items:flex-end;
    justify-content:center;
  }
  .sheet-overlay.open{display:flex;}
  .sheet{
    background:var(--bg-elev);
    border-radius:24px 24px 0 0;
    width:100%;max-width:480px;
    padding:10px 20px calc(24px + env(safe-area-inset-bottom));
    max-height:88vh;overflow-y:auto;
    animation:slideUp .25s ease;
    border-top:1px solid var(--border);
  }
  @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .sheet-handle{
    width:36px;height:4px;background:var(--border);
    border-radius:100px;margin:6px auto 14px;
  }
  .sheet h2{font-size:19px;margin:0 0 18px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12.5px;color:var(--text-dim);font-weight:600;margin-bottom:7px;}
  .field input[type=text]{
    width:100%;padding:13px 14px;
    background:var(--bg-elev2);
    border:1px solid var(--border);
    border-radius:var(--radius-sm);
    color:var(--text);font-size:15px;
    outline:none;
  }
  .field input:focus{border-color:var(--text-dim);}
  .cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .cat-option{
    display:flex;flex-direction:column;align-items:center;gap:6px;
    padding:12px 6px;border-radius:var(--radius-sm);
    border:2px solid var(--border);
    background:var(--bg-elev2);
    cursor:pointer;
    font-size:11.5px;font-weight:600;color:var(--text-dim);
  }
  .cat-option .dot{width:18px;height:18px;border-radius:50%;}
  .cat-option.selected{border-color:var(--cat-color);color:var(--text);background:color-mix(in srgb, var(--cat-color) 12%, var(--bg-elev2));}
  .freq-grid{display:flex;gap:6px;flex-wrap:wrap;}
  .day-chip{
    width:38px;height:38px;border-radius:50%;
    border:1px solid var(--border);background:var(--bg-elev2);
    color:var(--text-dim);font-size:12px;font-weight:600;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .day-chip.selected{background:var(--text);color:var(--bg);border-color:var(--text);}
  .reminder-row{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--bg-elev2);border:1px solid var(--border);
    border-radius:var(--radius-sm);padding:13px 14px;margin-bottom:10px;
  }
  .toggle{
    width:46px;height:27px;border-radius:100px;
    background:var(--border);position:relative;cursor:pointer;
    flex-shrink:0;transition:background .15s ease;
  }
  .toggle.on{background:#3ddc97;}
  .toggle::after{
    content:'';position:absolute;top:2px;left:2px;
    width:23px;height:23px;border-radius:50%;background:#fff;
    transition:transform .15s ease;
  }
  .toggle.on::after{transform:translateX(19px);}
  input[type=time]{
    background:var(--bg-elev2);border:1px solid var(--border);
    color:var(--text);border-radius:8px;padding:6px 8px;font-size:14px;
  }
  .btn-row{display:flex;gap:10px;margin-top:20px;}
  .btn{
    flex:1;padding:14px;border-radius:var(--radius-sm);
    font-size:15px;font-weight:700;border:none;cursor:pointer;
  }
  .btn-primary{background:var(--text);color:var(--bg);}
  .btn-secondary{background:var(--bg-elev2);color:var(--text-dim);border:1px solid var(--border);}
  .btn-danger{background:rgba(255,92,92,0.12);color:var(--danger);}
  .btn:active{opacity:0.8;}

  /* STATS PAGE */
  .stats-header{font-size:24px;font-weight:700;padding:24px 16px 4px;max-width:480px;margin:0 auto;}
  .stat-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0;}
  .stat-card{
    background:var(--bg-elev);border:1px solid var(--border);
    border-radius:var(--radius);padding:16px;
  }
  .stat-card .val{font-size:24px;font-weight:700;}
  .stat-card .lbl{font-size:12px;color:var(--text-dim);margin-top:2px;}
  .chart-card{
    background:var(--bg-elev);border:1px solid var(--border);
    border-radius:var(--radius);padding:18px;margin-bottom:14px;
  }
  .chart-card h3{font-size:14px;font-weight:600;margin:0 0 14px;color:var(--text);}
  .week-bars{display:flex;justify-content:space-between;align-items:flex-end;height:90px;gap:6px;}
  .week-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:6px;}
  .week-bar{width:100%;border-radius:5px 5px 2px 2px;background:var(--bg-elev2);transition:height .3s ease;min-height:4px;}
  .week-bar-label{font-size:10.5px;color:var(--text-faint);font-weight:600;}
  .heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .heat-cell{aspect-ratio:1;border-radius:4px;background:var(--bg-elev2);}
  .cat-breakdown-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .cat-breakdown-row .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .cat-breakdown-row .name{flex:1;font-size:13.5px;font-weight:600;}
  .cat-breakdown-row .bar-bg{flex:1.6;height:7px;background:var(--bg-elev2);border-radius:100px;overflow:hidden;}
  .cat-breakdown-row .bar-fill{height:100%;border-radius:100px;}
  .cat-breakdown-row .pct{font-size:12.5px;color:var(--text-dim);width:34px;text-align:right;}

  .toast{
    position:fixed;bottom:160px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--bg-elev2);border:1px solid var(--border);
    color:var(--text);padding:11px 18px;border-radius:100px;
    font-size:13.5px;font-weight:600;
    opacity:0;transition:all .25s ease;
    z-index:60;pointer-events:none;
    box-shadow:0 8px 24px rgba(0,0,0,0.4);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="page-today">
  <header>
    <div class="header-row">
      <div>
        <div class="greeting" id="greeting-text">Hallo</div>
        <div class="date-big" id="date-text"></div>
      </div>
      <div class="streak-pill">🔥 <span id="overall-streak">0</span></div>
    </div>
    <div class="progress-ring-wrap">
      <svg class="ring-svg" width="56" height="56" viewBox="0 0 56 56">
        <circle cx="28" cy="28" r="24" fill="none" stroke="var(--bg-elev2)" stroke-width="6"/>
        <circle id="ring-progress" cx="28" cy="28" r="24" fill="none" stroke="#3ddc97" stroke-width="6"
          stroke-dasharray="150.8" stroke-dashoffset="150.8" stroke-linecap="round" transform="rotate(-90 28 28)"/>
      </svg>
      <div class="progress-text">
        <div class="big" id="progress-fraction">0/0 erledigt</div>
        <div class="sub" id="progress-sub">Leg los und hak deine erste Habit ab</div>
      </div>
    </div>
  </header>

  <div class="app">
    <div class="tabs" id="category-tabs"></div>
    <div class="habit-list" id="habit-list"></div>
  </div>
</div>

<div id="page-stats" style="display:none;">
  <div class="stats-header">Statistiken</div>
  <div class="app">
    <div class="stat-cards">
      <div class="stat-card">
        <div class="val" id="stat-total-habits">0</div>
        <div class="lbl">Aktive Habits</div>
      </div>
      <div class="stat-card">
        <div class="val" id="stat-best-streak">0</div>
        <div class="lbl">Beste Streak</div>
      </div>
      <div class="stat-card">
        <div class="val" id="stat-week-rate">0%</div>
        <div class="lbl">Diese Woche</div>
      </div>
      <div class="stat-card">
        <div class="val" id="stat-total-checks">0</div>
        <div class="lbl">Insgesamt erledigt</div>
      </div>
    </div>

    <div class="chart-card">
      <h3>Letzte 7 Tage</h3>
      <div class="week-bars" id="week-bars"></div>
    </div>

    <div class="chart-card">
      <h3>Nach Kategorie</h3>
      <div id="cat-breakdown"></div>
    </div>

    <div class="chart-card">
      <h3>Aktivität (letzte 35 Tage)</h3>
      <div class="heatmap" id="heatmap"></div>
    </div>
  </div>
</div>

<button class="fab" id="fab-add" aria-label="Habit hinzufügen">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-today">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    Heute
  </button>
  <button class="nav-btn" id="nav-stats">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Statistik
  </button>
</nav>

<div class="sheet-overlay" id="sheet-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 id="sheet-title">Neue Habit</h2>

    <div class="field">
      <label>Name</label>
      <input type="text" id="input-name" placeholder="z.B. 30 Min. lesen" maxlength="40">
    </div>

    <div class="field">
      <label>Kategorie</label>
      <div class="cat-grid" id="cat-grid"></div>
    </div>

    <div class="field">
      <label>An welchen Tagen?</label>
      <div class="freq-grid" id="freq-grid"></div>
    </div>

    <div class="field">
      <label>Erinnerung</label>
      <div class="reminder-row">
        <div>Tägliche Erinnerung</div>
        <div class="toggle" id="reminder-toggle"></div>
      </div>
      <div class="reminder-row" id="reminder-time-row" style="display:none;">
        <div>Uhrzeit</div>
        <input type="time" id="reminder-time" value="09:00">
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-secondary" id="btn-cancel">Abbrechen</button>
      <button class="btn btn-primary" id="btn-save">Speichern</button>
    </div>
    <div class="btn-row" id="delete-row" style="display:none;">
      <button class="btn btn-danger" id="btn-delete">Habit löschen</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  // ---------- CONFIG ----------
  var CATEGORIES = [
    {id:'sport', name:'Sport', color:'var(--sport)', hex:'#3ddc97'},
    {id:'lernen', name:'Lernen', color:'var(--lernen)', hex:'#5b9dff'},
    {id:'gesundheit', name:'Gesundheit', color:'var(--gesundheit)', hex:'#ff7a7a'},
    {id:'kreativ', name:'Kreativ', color:'var(--kreativ)', hex:'#c792ea'},
    {id:'arbeit', name:'Arbeit', color:'var(--arbeit)', hex:'#ffb84d'},
    {id:'sonstiges', name:'Sonstiges', color:'var(--sonstiges)', hex:'#9aa3af'}
  ];
  var DAY_LABELS = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  var STORAGE_KEY = 'habit-tracker-data-v1';

  // ---------- STATE ----------
  var state = loadState();
  var currentFilter = 'all';
  var editingHabitId = null;
  var selectedCat = 'sport';
  var selectedDays = [0,1,2,3,4,5,6];
  var reminderOn = false;

  function loadState(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(raw) return JSON.parse(raw);
    }catch(e){}
    return {habits:[], checks:{}};
  }
  function saveState(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
  }

  function todayKey(d){
    d = d || new Date();
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  function dowOf(dateStr){
    var parts = dateStr.split('-');
    return new Date(parts[0],parts[1]-1,parts[2]).getDay();
  }
  function catById(id){
    for(var i=0;i<CATEGORIES.length;i++) if(CATEGORIES[i].id===id) return CATEGORIES[i];
    return CATEGORIES[5];
  }
  function isScheduledToday(habit, dateStr){
    dateStr = dateStr || todayKey();
    var dow = dowOf(dateStr);
    return habit.days.indexOf(dow) !== -1;
  }
  function isChecked(habitId, dateStr){
    dateStr = dateStr || todayKey();
    return !!(state.checks[dateStr] && state.checks[dateStr][habitId]);
  }
  function setChecked(habitId, dateStr, val){
    if(!state.checks[dateStr]) state.checks[dateStr] = {};
    if(val) state.checks[dateStr][habitId] = true;
    else delete state.checks[dateStr][habitId];
    saveState();
  }

  function computeStreak(habit){
    var streak = 0;
    var d = new Date();
    // if today not done yet but scheduled, start counting from yesterday
    var tk = todayKey(d);
    if(isScheduledToday(habit, tk) && !isChecked(habit.id, tk)){
      d.setDate(d.getDate()-1);
    }
    for(var i=0;i<3650;i++){
      var key = todayKey(d);
      var dow = d.getDay();
      if(habit.days.indexOf(dow) === -1){
        d.setDate(d.getDate()-1);
        continue;
      }
      if(isChecked(habit.id, key)){
        streak++;
        d.setDate(d.getDate()-1);
      } else {
        break;
      }
    }
    return streak;
  }

  function bestStreakOverall(){
    var best = 0;
    state.habits.forEach(function(h){
      var s = computeStreak(h);
      if(s>best) best = s;
    });
    return best;
  }

  function totalChecksCount(){
    var count = 0;
    Object.keys(state.checks).forEach(function(date){
      count += Object.keys(state.checks[date]).length;
    });
    return count;
  }

  // ---------- TOAST ----------
  var toastEl = document.getElementById('toast');
  var toastTimer;
  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toastEl.classList.remove('show'); }, 1800);
  }

  // ---------- RENDER: TODAY ----------
  var greetingEl = document.getElementById('greeting-text');
  var dateTextEl = document.getElementById('date-text');
  var tabsEl = document.getElementById('category-tabs');
  var listEl = document.getElementById('habit-list');
  var fractionEl = document.getElementById('progress-fraction');
  var subEl = document.getElementById('progress-sub');
  var ringEl = document.getElementById('ring-progress');
  var overallStreakEl = document.getElementById('overall-streak');

  function renderGreeting(){
    var h = new Date().getHours();
    greetingEl.textContent = h<12 ? 'Guten Morgen' : (h<18 ? 'Guten Tag' : 'Guten Abend');
    var opts = {weekday:'long', day:'numeric', month:'long'};
    dateTextEl.textContent = new Date().toLocaleDateString('de-DE', opts);
  }

  function renderTabs(){
    var usedCats = {};
    state.habits.forEach(function(h){ usedCats[h.category]=true; });
    var html = '<div class="tab'+(currentFilter==='all'?' active':'')+'" data-cat="all">Alle</div>';
    CATEGORIES.forEach(function(c){
      if(usedCats[c.id]){
        html += '<div class="tab'+(currentFilter===c.id?' active':'')+'" data-cat="'+c.id+'">'+c.name+'</div>';
      }
    });
    tabsEl.innerHTML = html;
    Array.prototype.forEach.call(tabsEl.querySelectorAll('.tab'), function(el){
      el.addEventListener('click', function(){
        currentFilter = el.getAttribute('data-cat');
        renderTabs();
        renderHabitList();
      });
    });
  }

  function checkIconSvg(){
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  }
  function editIconSvg(){
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
  }

  function renderHabitList(){
    var todayDow = new Date().getDay();
    var visible = state.habits.filter(function(h){
      if(currentFilter!=='all' && h.category!==currentFilter) return false;
      return true;
    });

    if(visible.length===0){
      listEl.innerHTML = '<div class="empty-state">'+
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M9 12l2 2 4-4"/></svg>'+
        '<div class="title">Noch keine Habits</div>'+
        '<div class="sub">Tippe auf + um deine erste Gewohnheit anzulegen</div>'+
        '</div>';
      updateProgressHeader([]);
      return;
    }

    var html = '';
    visible.forEach(function(h){
      var cat = catById(h.category);
      var scheduled = isScheduledToday(h);
      var done = isChecked(h.id);
      var streak = computeStreak(h);
      html += '<div class="habit-card '+(done?'done':'')+'" style="--cat-color:'+cat.hex+'" data-id="'+h.id+'">'+
        '<div class="cat-bar"></div>'+
        '<button class="check-btn '+(done?'checked':'')+'" data-action="toggle" data-id="'+h.id+'" '+(scheduled?'':'style="opacity:0.35"')+'>'+
          (done ? checkIconSvg() : '') +
        '</button>'+
        '<div class="habit-info">'+
          '<div class="habit-name">'+escapeHtml(h.name)+'</div>'+
          '<div class="habit-meta">'+
            '<span class="cat-chip">'+cat.name+'</span>'+
            '<span class="streak-mini">🔥 '+streak+'</span>'+
            (!scheduled ? '<span>· nicht heute geplant</span>' : '') +
          '</div>'+
        '</div>'+
        '<div class="habit-actions">'+
          '<button class="icon-btn" data-action="edit" data-id="'+h.id+'">'+editIconSvg()+'</button>'+
        '</div>'+
      '</div>';
    });
    listEl.innerHTML = html;

    Array.prototype.forEach.call(listEl.querySelectorAll('[data-action="toggle"]'), function(btn){
      btn.addEventListener('click', function(){
        var id = btn.getAttribute('data-id');
        var nowDone = !isChecked(id);
        setChecked(id, todayKey(), nowDone);
        if(nowDone && navigator.vibrate) navigator.vibrate(15);
        renderHabitList();
        renderHeaderStreak();
      });
    });
    Array.prototype.forEach.call(listEl.querySelectorAll('[data-action="edit"]'), function(btn){
      btn.addEventListener('click', function(){
        openSheet(btn.getAttribute('data-id'));
      });
    });

    updateProgressHeader(state.habits.filter(function(h){ return isScheduledToday(h); }));
  }

  function escapeHtml(s){
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function updateProgressHeader(scheduledHabits){
    var total = scheduledHabits.length;
    var done = scheduledHabits.filter(function(h){ return isChecked(h.id); }).length;
    fractionEl.textContent = done+'/'+total+' erledigt';
    var circumference = 150.8;
    var pct = total>0 ? done/total : 0;
    ringEl.setAttribute('stroke-dashoffset', circumference - (circumference*pct));
    if(total===0){
      subEl.textContent = 'Leg los und füg deine erste Habit hinzu';
    } else if(done===total){
      subEl.textContent = 'Alles erledigt – stark! 🎉';
    } else {
      subEl.textContent = (total-done)+' noch offen für heute';
    }
  }

  function renderHeaderStreak(){
    overallStreakEl.textContent = bestStreakOverall();
  }

  // ---------- SHEET (ADD/EDIT) ----------
  var overlayEl = document.getElementById('sheet-overlay');
  var sheetTitleEl = document.getElementById('sheet-title');
  var inputNameEl = document.getElementById('input-name');
  var catGridEl = document.getElementById('cat-grid');
  var freqGridEl = document.getElementById('freq-grid');
  var reminderToggleEl = document.getElementById('reminder-toggle');
  var reminderTimeRowEl = document.getElementById('reminder-time-row');
  var reminderTimeEl = document.getElementById('reminder-time');
  var deleteRowEl = document.getElementById('delete-row');

  function renderCatGrid(){
    var html = '';
    CATEGORIES.forEach(function(c){
      html += '<div class="cat-option '+(selectedCat===c.id?'selected':'')+'" style="--cat-color:'+c.hex+'" data-cat="'+c.id+'">'+
        '<div class="dot" style="background:'+c.hex+'"></div>'+c.name+
      '</div>';
    });
    catGridEl.innerHTML = html;
    Array.prototype.forEach.call(catGridEl.querySelectorAll('.cat-option'), function(el){
      el.addEventListener('click', function(){
        selectedCat = el.getAttribute('data-cat');
        renderCatGrid();
      });
    });
  }
  function renderFreqGrid(){
    var html = '';
    DAY_LABELS.forEach(function(label, idx){
      html += '<div class="day-chip '+(selectedDays.indexOf(idx)!==-1?'selected':'')+'" data-day="'+idx+'">'+label+'</div>';
    });
    freqGridEl.innerHTML = html;
    Array.prototype.forEach.call(freqGridEl.querySelectorAll('.day-chip'), function(el){
      el.addEventListener('click', function(){
        var d = parseInt(el.getAttribute('data-day'),10);
        var idx = selectedDays.indexOf(d);
        if(idx===-1) selectedDays.push(d); else selectedDays.splice(idx,1);
        renderFreqGrid();
      });
    });
  }

  reminderToggleEl.addEventListener('click', function(){
    reminderOn = !reminderOn;
    reminderToggleEl.classList.toggle('on', reminderOn);
    reminderTimeRowEl.style.display = reminderOn ? 'flex' : 'none';
    if(reminderOn && 'Notification' in window && Notification.permission==='default'){
      Notification.requestPermission();
    }
  });

  function openSheet(habitId){
    editingHabitId = habitId || null;
    if(editingHabitId){
      var h = state.habits.find(function(x){return x.id===editingHabitId;});
      sheetTitleEl.textContent = 'Habit bearbeiten';
      inputNameEl.value = h.name;
      selectedCat = h.category;
      selectedDays = h.days.slice();
      reminderOn = !!h.reminder;
      reminderTimeEl.value = h.reminderTime || '09:00';
      deleteRowEl.style.display = 'flex';
    } else {
      sheetTitleEl.textContent = 'Neue Habit';
      inputNameEl.value = '';
      selectedCat = 'sport';
      selectedDays = [0,1,2,3,4,5,6];
      reminderOn = false;
      reminderTimeEl.value = '09:00';
      deleteRowEl.style.display = 'none';
    }
    reminderToggleEl.classList.toggle('on', reminderOn);
    reminderTimeRowEl.style.display = reminderOn ? 'flex' : 'none';
    renderCatGrid();
    renderFreqGrid();
    overlayEl.classList.add('open');
    setTimeout(function(){ inputNameEl.focus(); }, 200);
  }
  function closeSheet(){
    overlayEl.classList.remove('open');
    editingHabitId = null;
  }

  document.getElementById('fab-add').addEventListener('click', function(){ openSheet(null); });
  document.getElementById('btn-cancel').addEventListener('click', closeSheet);
  overlayEl.addEventListener('click', function(e){ if(e.target===overlayEl) closeSheet(); });

  document.getElementById('btn-save').addEventListener('click', function(){
    var name = inputNameEl.value.trim();
    if(!name){ showToast('Bitte einen Namen eingeben'); return; }
    if(selectedDays.length===0){ showToast('Wähle mindestens einen Tag'); return; }

    if(editingHabitId){
      var h = state.habits.find(function(x){return x.id===editingHabitId;});
      h.name = name; h.category = selectedCat; h.days = selectedDays.slice();
      h.reminder = reminderOn; h.reminderTime = reminderTimeEl.value;
      showToast('Habit aktualisiert');
    } else {
      state.habits.push({
        id: 'h_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),
        name: name, category: selectedCat, days: selectedDays.slice(),
        reminder: reminderOn, reminderTime: reminderTimeEl.value,
        createdAt: todayKey()
      });
      showToast('Habit angelegt 🎉');
    }
    saveState();
    closeSheet();
    renderTabs();
    renderHabitList();
    renderHeaderStreak();
    scheduleReminders();
  });

  document.getElementById('btn-delete').addEventListener('click', function(){
    if(!editingHabitId) return;
    state.habits = state.habits.filter(function(x){return x.id!==editingHabitId;});
    saveState();
    closeSheet();
    renderTabs();
    renderHabitList();
    renderHeaderStreak();
    showToast('Habit gelöscht');
  });

  // ---------- NAVIGATION ----------
  var pageToday = document.getElementById('page-today');
  var pageStats = document.getElementById('page-stats');
  var navToday = document.getElementById('nav-today');
  var navStats = document.getElementById('nav-stats');
  var fabEl = document.getElementById('fab-add');

  navToday.addEventListener('click', function(){
    pageToday.style.display='block'; pageStats.style.display='none';
    navToday.classList.add('active'); navStats.classList.remove('active');
    fabEl.style.display='flex';
  });
  navStats.addEventListener('click', function(){
    pageToday.style.display='none'; pageStats.style.display='block';
    navToday.classList.remove('active'); navStats.classList.add('active');
    fabEl.style.display='none';
    renderStats();
  });

  // ---------- STATS ----------
  function renderStats(){
    document.getElementById('stat-total-habits').textContent = state.habits.length;
    document.getElementById('stat-best-streak').textContent = bestStreakOverall();
    document.getElementById('stat-total-checks').textContent = totalChecksCount();

    // week rate: scheduled vs done over last 7 days
    var totalScheduled=0, totalDone=0;
    var weekBarsHtml = '';
    var maxForWeek = 1;
    var dayCounts = [];
    for(var i=6;i>=0;i--){
      var d = new Date(); d.setDate(d.getDate()-i);
      var key = todayKey(d);
      var dow = d.getDay();
      var scheduledCount=0, doneCount=0;
      state.habits.forEach(function(h){
        if(h.days.indexOf(dow)!==-1){
          scheduledCount++;
          if(isChecked(h.id, key)) doneCount++;
        }
      });
      dayCounts.push({label: DAY_LABELS[dow], done:doneCount, scheduled:scheduledCount});
      totalScheduled += scheduledCount; totalDone += doneCount;
      if(scheduledCount>maxForWeek) maxForWeek = scheduledCount;
    }
    var rate = totalScheduled>0 ? Math.round((totalDone/totalScheduled)*100) : 0;
    document.getElementById('stat-week-rate').textContent = rate+'%';

    dayCounts.forEach(function(dc){
      var h = dc.scheduled>0 ? Math.max(8, (dc.done/Math.max(maxForWeek,1))*80) : 4;
      var color = dc.scheduled>0 && dc.done===dc.scheduled && dc.scheduled>0 ? '#3ddc97' : (dc.done>0 ? '#5b9dff' : 'var(--bg-elev2)');
      weekBarsHtml += '<div class="week-bar-col"><div class="week-bar" style="height:'+h+'px;background:'+color+'"></div><div class="week-bar-label">'+dc.label+'</div></div>';
    });
    document.getElementById('week-bars').innerHTML = weekBarsHtml;

    // category breakdown
    var catCounts = {};
    Object.keys(state.checks).forEach(function(date){
      Object.keys(state.checks[date]).forEach(function(habitId){
        var h = state.habits.find(function(x){return x.id===habitId;});
        if(h){ catCounts[h.category] = (catCounts[h.category]||0)+1; }
      });
    });
    var maxCat = Math.max.apply(null, Object.values(catCounts).concat([1]));
    var breakdownHtml = '';
    var usedCats = CATEGORIES.filter(function(c){ return catCounts[c.id]; });
    if(usedCats.length===0){
      breakdownHtml = '<div style="font-size:13px;color:var(--text-dim);text-align:center;padding:10px 0;">Noch keine Daten vorhanden</div>';
    } else {
      usedCats.sort(function(a,b){ return (catCounts[b.id]||0)-(catCounts[a.id]||0); });
      usedCats.forEach(function(c){
        var count = catCounts[c.id]||0;
        var pct = Math.round((count/maxCat)*100);
        breakdownHtml += '<div class="cat-breakdown-row">'+
          '<div class="dot" style="background:'+c.hex+'"></div>'+
          '<div class="name">'+c.name+'</div>'+
          '<div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%;background:'+c.hex+'"></div></div>'+
          '<div class="pct">'+count+'</div>'+
        '</div>';
      });
    }
    document.getElementById('cat-breakdown').innerHTML = breakdownHtml;

    // heatmap last 35 days
    var heatHtml = '';
    for(var j=34;j>=0;j--){
      var hd = new Date(); hd.setDate(hd.getDate()-j);
      var hkey = todayKey(hd);
      var hdow = hd.getDay();
      var sched=0, done=0;
      state.habits.forEach(function(h){
        if(h.days.indexOf(hdow)!==-1){ sched++; if(isChecked(h.id,hkey)) done++; }
      });
      var opacity = sched>0 ? (0.15 + 0.85*(done/sched)) : 0.06;
      var bg = sched>0 && done>0 ? 'rgba(61,220,151,'+opacity.toFixed(2)+')' : 'var(--bg-elev2)';
      heatHtml += '<div class="heat-cell" style="background:'+bg+'" title="'+hkey+'"></div>';
    }
    document.getElementById('heatmap').innerHTML = heatHtml;
  }

  // ---------- REMINDERS (best-effort, in-app) ----------
  var reminderTimers = [];
  function scheduleReminders(){
    reminderTimers.forEach(function(t){ clearTimeout(t); });
    reminderTimers = [];
    if(!('Notification' in window) || Notification.permission!=='granted') return;
    state.habits.forEach(function(h){
      if(!h.reminder || !h.reminderTime) return;
      var parts = h.reminderTime.split(':');
      var target = new Date();
      target.setHours(parseInt(parts[0],10), parseInt(parts[1],10), 0, 0);
      if(target.getTime() < Date.now()) target.setDate(target.getDate()+1);
      var delay = target.getTime() - Date.now();
      if(delay > 0 && delay < 86400000*2){
        var t = setTimeout(function(){
          if(isScheduledToday(h) && !isChecked(h.id)){
            try{ new Notification('Zeit für: '+h.name, {body:'Tippe, um es abzuhaken.', icon:''}); }catch(e){}
          }
        }, delay);
        reminderTimers.push(t);
      }
    });
  }

  // ---------- INIT ----------
  function init(){
    renderGreeting();
    renderTabs();
    renderHabitList();
    renderHeaderStreak();
    scheduleReminders();
    setInterval(function(){
      renderGreeting();
    }, 60000);
  }
  init();

  // ---------- PWA: SERVICE WORKER ----------
  if('serviceWorker' in navigator){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('sw.js').catch(function(e){
        console.log('SW registration failed', e);
      });
    });
  }
})();
</script>
</body>
</html>
